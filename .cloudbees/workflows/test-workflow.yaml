apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Test workflow
on:
  workflow_dispatch:

permissions:
  id-token: write
  scm-token-own: read
  scm-token-org: read

jobs:
  deploy-qa:
    steps:
      - name: Get source code
        uses: cloudbees-io/checkout@v2
        with:
          repository: https://github.com/apandharkar/demo-app

      - name: Login to AWS Account
        uses: cloudbees-io/configure-aws-credentials@v1
        id: aws-login
        with:
          aws-region: us-east-1
          role-to-assume: "arn:aws:iam::709386575454:role/qa-cloudbees-infra-mgmt"
          role-duration-seconds: "3600"

      - name: "Configure EKS credentials"
        uses: cloudbees-io/configure-eks-credentials@v1
        with:
          name: "eks-qa-us-east-1"
          region: us-east-1
          alias: platform-east

      - name: "Configure EKS credentials"
        uses: cloudbees-io/configure-eks-credentials@v1
        with:
          name: "tekton-qa-us-east-1-gree"
          region: us-east-1
          alias: tekton_cluster_east_green

      - name: "Configure EKS credentials"
        uses: cloudbees-io/configure-eks-credentials@v1
        with:
          name: "eks-qa-us-west-2"
          region: us-west-2
          alias: platform-west

      - name: "Configure EKS credentials"
        uses: cloudbees-io/configure-eks-credentials@v1
        with:
          name: "tekton-qa-us-west-2-green"
          region: us-west-2
          alias: tekton_cluster_west_green

      - name: kubectl command on the clusters
        uses: docker://ghcr.io/helmfile/helmfile:v1.1.3
        run: |
          kubectl config get-contexts
          kubectl config current-context
          echo "============================="
          kubectl config use-context platform-east
          kubectl get pods -A
          echo "=============================="
          kubectl config use-context tekton_cluster_east_green
          kubectl get pods -A
          echo "=============================="
          kubectl config use-context platform-west
          kubectl get pods -A
          echo "=============================="
          kubectl config use-context tekton_cluster_west_green
          kubectl get pods -A
          echo "=============================="